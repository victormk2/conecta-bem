spring.application.name=conectabem

# JWT settings for tests
jwt.secret=test-secret-key-0123456789abcdef0123456789abcdef
jwt.expirationMinutes=15

# H2 Database Configuration for Testing (in-memory)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable Flyway migrations for tests (Hibernate will create schema)
spring.flyway.enabled=false






